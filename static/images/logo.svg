<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <!-- Drop shadow definitions -->
  <defs>
    <filter id="text-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.3" />
    </filter>
    <filter id="light-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>

  <g transform="translate(30, 20)">
    <!-- Central horizontal line (purple) -->
    <path d="M 0,70 L 400,70" fill="none" stroke="#482559" stroke-width="4" />
    
    <!-- Outer orange wave (amplitude is high) -->
    <!-- Dips down on left, up, down, up, down -->
    <path d="M 0,65 C 10,140 30,140 40,70 C 50,0 80,0 90,70 C 100,140 120,140 130,70 C 140,0 170,0 180,70 C 190,140 210,140 220,70 C 230,0 260,0 270,70 C 280,140 310,140 320,70 C 330,0 360,0 370,70" fill="none" stroke="#E69538" stroke-width="3" />
    
    <!-- Inner purple wave (amplitude is smaller) -->
    <path d="M 0,68 C 20,80 30,80 40,70 C 50,55 70,55 80,70 C 90,85 110,85 120,70 C 130,55 150,55 160,70 C 170,85 190,85 200,70 C 210,55 230,55 240,70 C 250,85 270,85 280,70 C 290,55 310,55 320,70 C 330,85 350,85 360,70" fill="none" stroke="#482559" stroke-width="3" />

    <!-- TIFLAS text with split color -->
    <g filter="url(#text-shadow)" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="82" letter-spacing="-2">
      <!-- TIF (Purple) -->
      <text x="5" y="115" fill="#482559">TIF</text>
      <!-- LAS (Orange) -->
      <text x="155" y="115" fill="#E69538">LAS</text>
    </g>

    <!-- Subtitle text with white outline effect to mimic image -->
    <g font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="18" letter-spacing="-0.5">
      <!-- White stroke for readability -->
      <text x="50" y="145" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round">Seismograph Digitalization</text>
      <!-- Orange fill -->
      <text x="50" y="145" fill="#E69538">Seismograph Digitalization</text>
    </g>
  </g>
</svg>
